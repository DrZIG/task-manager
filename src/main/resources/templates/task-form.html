<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — Task Manager'">Task Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-kanban me-1"></i> Task Manager
        </a>
    </div>
</nav>

<div class="container" style="max-width: 720px;">
    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h4 class="mb-0 fw-bold">
                <i class="bi bi-list-check me-2 text-primary"></i>
                <span th:text="${pageTitle}">Task</span>
            </h4>
        </div>
        <div class="card-body p-4">

            <form th:action="${task.id != null} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
                  th:object="${task}"
                  method="post"
                  id="task-form">

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{title}" class="form-control"
                           placeholder="e.g. Implement login feature" required>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"
                              placeholder="Describe what this task involves..."></textarea>
                </div>

                <!-- GitHub Link -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-github me-1"></i> GitHub Issue Link
                    </label>
                    <input type="url" th:field="*{githubIssueLink}" class="form-control"
                           placeholder="https://github.com/org/repo/issues/123">
                </div>

                <!-- Notes -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-sticky me-1"></i> Notes
                    </label>
                    <div id="notes-container">
                        <div th:if="${#lists.isEmpty(task.notes)}" class="note-row mb-2">
                            <div class="input-group">
                                <input type="text" name="notes" class="form-control" placeholder="Add a note...">
                                <button type="button" class="btn btn-outline-danger" onclick="removeNote(this)">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                        <div th:each="note : ${task.notes}" class="note-row mb-2">
                            <div class="input-group">
                                <input type="text" name="notes" class="form-control"
                                       th:value="${note.content}" placeholder="Add a note...">
                                <button type="button" class="btn btn-outline-danger" onclick="removeNote(this)">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="addNote()">
                        <i class="bi bi-plus me-1"></i> Add Note
                    </button>
                </div>

                <!-- Actions -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${task.id != null} ? 'Save Changes' : 'Create Task'">Save</span>
                    </button>
                    <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function addNote() {
        const container = document.getElementById('notes-container');
        const div = document.createElement('div');
        div.className = 'note-row mb-2';
        div.innerHTML = `
            <div class="input-group">
                <input type="text" name="notes" class="form-control" placeholder="Add a note...">
                <button type="button" class="btn btn-outline-danger" onclick="removeNote(this)">
                    <i class="bi bi-x"></i>
                </button>
            </div>`;
        container.appendChild(div);
        div.querySelector('input').focus();
    }

    function removeNote(btn) {
        btn.closest('.note-row').remove();
    }
</script>
</body>
</html>
