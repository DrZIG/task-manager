<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Set New Password — Task Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-sm" style="width: 420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock fs-1 text-warning"></i>
                <h2 class="mt-2 fw-bold">Set Your Password</h2>
                <p class="text-muted">You must set a new password before continuing.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/change-password}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" name="newPassword" class="form-control"
                           placeholder="At least 6 characters" required minlength="6" autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-control"
                           placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-semibold">
                    <i class="bi bi-check-circle me-1"></i> Set Password &amp; Continue
                </button>
            </form>

            <hr>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-link w-100 text-muted small">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout instead
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
