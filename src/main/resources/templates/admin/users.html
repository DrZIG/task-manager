<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Management — Task Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}">
    <link rel="apple-touch-icon" th:href="@{/apple-touch-icon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-kanban me-1"></i> Task Manager
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white-50 small">
                <i class="bi bi-shield-check me-1"></i> Admin Panel
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 860px;">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Create user -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white fw-bold py-3">
            <i class="bi bi-person-plus me-1 text-primary"></i> Create New User
        </div>
        <div class="card-body">
            <form th:action="@{/admin/users}" method="post" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter username" required minlength="3">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Role</label>
                    <select name="role" class="form-select">
                        <option value="ROLE_USER">User</option>
                        <option value="ROLE_ADMIN">Admin</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg me-1"></i> Create
                    </button>
                </div>
                <div class="col-12">
                    <div class="text-muted small">
                        <i class="bi bi-info-circle me-1"></i>
                        Temporary password will be:
                        <code th:text="${defaultPassword}"></code> —
                        user must change it on first login.
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Users list -->
    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold py-3">
            <i class="bi bi-people me-1 text-primary"></i>
            All Users
            <span class="badge bg-secondary ms-1" th:text="${#lists.size(users)}"></span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td class="fw-semibold">
                        <i class="bi bi-person-circle me-1 text-muted"></i>
                        <span th:text="${u.username}"></span>
                    </td>
                    <td>
                            <span th:if="${u.role == 'ROLE_ADMIN'}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle">
                                <i class="bi bi-shield-check me-1"></i>Admin
                            </span>
                        <span th:if="${u.role == 'ROLE_USER'}"
                              class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">
                                <i class="bi bi-person me-1"></i>User
                            </span>
                    </td>
                    <td>
                            <span th:if="${u.mustChangePassword}"
                                  class="badge bg-warning-subtle text-warning border border-warning-subtle">
                                <i class="bi bi-exclamation-triangle me-1"></i>Must change password
                            </span>
                        <span th:if="${!u.mustChangePassword}"
                              class="badge bg-success-subtle text-success border border-success-subtle">
                                <i class="bi bi-check-circle me-1"></i>Active
                            </span>
                    </td>
                    <td>
                        <form th:action="@{/admin/users/{id}/reset-password(id=${u.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Reset password for ' + /*[[${u.username}]]*/ '' + '?')">
                            <button class="btn btn-outline-warning btn-sm py-0 px-2 me-1" title="Reset password">
                                <i class="bi bi-key"></i> Reset
                            </button>
                        </form>
                        <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Delete user ' + /*[[${u.username}]]*/ '' + '? This cannot be undone.')">
                            <button class="btn btn-outline-danger btn-sm py-0 px-2" title="Delete user">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Back to Tasks
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
