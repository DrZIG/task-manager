<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — Task Manager'">Work Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-kanban me-1"></i> Task Manager
        </a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h4 class="mb-0 fw-bold">
                <i class="bi bi-clock me-2 text-primary"></i>
                <span th:text="${pageTitle}">Work</span>
            </h4>
        </div>
        <div class="card-body p-4">

            <form th:action="${work.id != null} ? @{/works/{id}(id=${work.id})} : @{/works}"
                  th:object="${work}"
                  method="post">

                <!-- Task selector -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Task <span class="text-danger">*</span></label>
                    <select name="taskId" class="form-select" required>
                        <option value="">— Select a task —</option>
                        <option th:each="t : ${tasks}"
                                th:value="${t.id}"
                                th:text="${t.title}"
                                th:selected="${t.id == selectedTaskId}">
                        </option>
                    </select>
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Work Date <span class="text-danger">*</span></label>
                    <input type="date"
                           name="workDate"
                           class="form-control"
                           th:value="${#temporals.format(work.workDate, 'yyyy-MM-dd')}"
                           required>
                </div>

                <!-- Time row -->
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label fw-semibold">Start Time <span class="text-danger">*</span></label>
                        <input type="text"
                               name="startTime"
                               class="form-control time-input"
                               th:value="${work.startTime != null ? #temporals.format(work.startTime, 'HH:mm') : ''}"
                               placeholder="HH:mm"
                               pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
                               maxlength="5"
                               autocomplete="off"
                               required>
                        <div class="form-text">24h format, e.g. 08:00 or 14:30</div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Finish Time <span class="text-danger">*</span></label>
                        <input type="text"
                               name="finishTime"
                               class="form-control time-input"
                               th:value="${work.finishTime != null ? #temporals.format(work.finishTime, 'HH:mm') : ''}"
                               placeholder="HH:mm"
                               pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
                               maxlength="5"
                               autocomplete="off"
                               required>
                        <div class="form-text">24h format, e.g. 08:00 or 14:30</div>
                    </div>
                </div>

                <!-- Duration preview -->
                <div id="duration-preview" class="alert alert-info py-2 small mb-3" style="display:none;">
                    <i class="bi bi-stopwatch me-1"></i> Duration: <strong id="duration-text"></strong>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"
                              placeholder="What did you work on?"></textarea>
                </div>

                <!-- Return-to hint -->
                <input type="hidden" name="returnTo" th:value="${param.from == 'works'} ? 'works' : ''">

                <!-- Actions -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${work.id != null} ? 'Save Changes' : 'Log Work'">Save</span>
                    </button>
                    <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const startInput = document.querySelector('input[name="startTime"]');
    const finishInput = document.querySelector('input[name="finishTime"]');
    const preview = document.getElementById('duration-preview');
    const durationText = document.getElementById('duration-text');

    // Auto-insert colon after 2 digits for convenience
    document.querySelectorAll('.time-input').forEach(input => {
        input.addEventListener('input', function () {
            let val = this.value.replace(/[^0-9]/g, '');
            if (val.length >= 3) {
                val = val.slice(0, 2) + ':' + val.slice(2, 4);
            }
            this.value = val;
            updateDuration();
        });
    });

    function parseTime(val) {
        const parts = val.split(':');
        if (parts.length !== 2) return null;
        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        if (isNaN(h) || isNaN(m) || h > 23 || m > 59) return null;
        return h * 60 + m;
    }

    function updateDuration() {
        const s = parseTime(startInput.value);
        const f = parseTime(finishInput.value);
        if (s === null || f === null || f <= s) {
            preview.style.display = 'none';
            return;
        }
        const mins = f - s;
        const h = Math.floor(mins / 60), m = mins % 60;
        durationText.textContent = (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm' : '');
        preview.style.display = 'block';
    }

    startInput.addEventListener('change', updateDuration);
    finishInput.addEventListener('change', updateDuration);
    updateDuration();
</script>
</body>
</html>
