<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — Task Manager'">Work Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}">
    <link rel="apple-touch-icon" th:href="@{/apple-touch-icon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-kanban me-1"></i> Task Manager
        </a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h4 class="mb-0 fw-bold">
                <i class="bi bi-clock me-2 text-primary"></i>
                <span th:text="${pageTitle}">Work</span>
            </h4>
        </div>
        <div class="card-body p-4">

            <form th:action="${work.id != null} ? @{/works/{id}(id=${work.id})} : @{/works}"
                  th:object="${work}"
                  method="post"
                  id="work-form">

                <!-- Task selector -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Task <span class="text-danger">*</span></label>
                    <select name="taskId" class="form-select" required>
                        <option value="">— Select a task —</option>
                        <option th:each="t : ${tasks}"
                                th:value="${t.id}"
                                th:text="${t.title}"
                                th:selected="${t.id == selectedTaskId}">
                        </option>
                    </select>
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Work Date <span class="text-danger">*</span></label>
                    <input type="date"
                           name="workDate"
                           class="form-control"
                           th:value="${work.workDate != null ? #temporals.format(work.workDate, 'yyyy-MM-dd') : ''}"
                           required>
                    <div class="form-text" id="workdate-hint" style="display:none;">
                        <i class="bi bi-geo-alt me-1"></i>Defaulted to today's date on your device.
                    </div>
                </div>

                <!-- Time row -->
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label fw-semibold">Start Time </label>
                        <input type="text"
                               name="startTime"
                               class="form-control time-input"
                               th:value="${work.startTime != null ? #temporals.format(work.startTime, 'HH:mm') : ''}"
                               placeholder="HH:mm"
                               pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
                               maxlength="5"
                               autocomplete="off">
                        <div class="form-text">24h format, e.g. 08:00 or 14:30</div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Finish Time </label>
                        <input type="text"
                               name="finishTime"
                               class="form-control time-input"
                               th:value="${work.finishTime != null ? #temporals.format(work.finishTime, 'HH:mm') : ''}"
                               placeholder="HH:mm"
                               pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
                               maxlength="5"
                               autocomplete="off">
                        <div class="form-text">24h format, e.g. 08:00 or 14:30</div>
                    </div>
                </div>

                <!-- Duration preview -->
                <div id="duration-preview" class="alert alert-info py-2 small mb-3" style="display:none;">
                    <i class="bi bi-stopwatch me-1"></i> Duration: <strong id="duration-text"></strong>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"
                              placeholder="What did you work on?"></textarea>
                </div>

                <!-- Hidden field so POST handlers also know where to return -->
                <input type="hidden" name="returnTaskId" th:value="${returnTaskId}">

                <!-- Return-to hint -->
                <input type="hidden" name="returnTo" th:value="${param.from == 'works'} ? 'works' : ''">

                <!-- Actions -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success" id="save-btn">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${work.id != null} ? 'Save Changes' : 'Log Work'">Save</span>
                    </button>
                    <a th:href="${returnTaskId != null} ? @{/(taskId=${returnTaskId})} : @{/}"
                       class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Fill in the client's local date for NEW work entries only.
    // Edit forms already have a th:value from the persisted work, so this
    // leaves them untouched. Using Date's local getters (not toISOString(),
    // which is UTC) avoids off-by-one-day bugs near midnight.
    (function initClientDate() {
        const dateInput = document.querySelector('input[name="workDate"]');
        if (dateInput && !dateInput.value) {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${yyyy}-${mm}-${dd}`;
            const hint = document.getElementById('workdate-hint');
            if (hint) hint.style.display = 'block';
        }
    })();

    const startInput = document.querySelector('input[name="startTime"]');
    const finishInput = document.querySelector('input[name="finishTime"]');
    const preview = document.getElementById('duration-preview');
    const durationText = document.getElementById('duration-text');

    // ─── Masked HH:mm overwrite editing ────────────────────────────────────
    // Splits a time string into its 4 editable digits: [H1, H2, M1, M2].
    // Anything that isn't already a clean "HH:MM" gets coerced first.
    function timeDigits(value) {
        if (!/^\d{2}:\d{2}$/.test(value)) {
            const raw = value.replace(/[^0-9]/g, '').padEnd(4, '0').slice(0, 4);
            value = raw.slice(0, 2) + ':' + raw.slice(2, 4);
        }
        return [value[0], value[1], value[3], value[4]];
    }

    // Caret sits at one of 6 positions in "HH:MM" (0..5). Map it to the digit
    // that should be overwritten next — the colon (position 2/3) is transparent.
    function digitIndexForCaret(pos) {
        if (pos <= 1) return pos;
        if (pos <= 3) return 2;
        return 3;
    }

    const CARET_BEFORE = [0, 1, 3, 4];   // caret position immediately before digit i
    const CARET_AFTER = [1, 3, 4, 0];    // where the caret lands after typing digit i (wraps after mm)

    // Rejects keystrokes that could never be part of a valid 24h time,
    // given what's already in the other digits.
    // idx0 (hour tens):  0, 1, 2 only        -> hour can't start with 3-9
    // idx1 (hour units): 0-3 if tens is '2', else 0-9  -> blocks 24-29
    // idx2 (minute tens): 0-5 only
    // idx3 (minute units): 0-9
    function isDigitAllowed(idx, key, digits) {
        if (idx === 0) return key <= '2';
        if (idx === 1) return digits[0] === '2' ? key <= '3' : true;
        if (idx === 2) return key <= '5';
        return true;
    }

    // Belt-and-suspenders: if editing a digit out of order still produces an
    // invalid hour (e.g. minutes typed first giving "_4:00", then hour tens
    // set to "2" giving "24:00"), snap the hour back to "00".
    function clampHour(digits) {
        const hour = parseInt(digits[0] + digits[1], 10);
        if (hour > 23) {
            digits[0] = '0';
            digits[1] = '0';
        }
    }

    document.querySelectorAll('.time-input').forEach(input => {

        input.addEventListener('keydown', function (e) {
            // If the user has an actual selection, or is using a modifier combo,
            // let the browser handle it natively (e.g. select-all + type, copy/paste).
            if (this.selectionStart !== this.selectionEnd || e.ctrlKey || e.metaKey || e.altKey) return;

            if (/^[0-9]$/.test(e.key)) {
                e.preventDefault();
                const digits = timeDigits(this.value);
                const idx = digitIndexForCaret(this.selectionStart);

                if (!isDigitAllowed(idx, e.key, digits)) {
                    return; // invalid digit for this slot — ignore, leave field untouched
                }

                digits[idx] = e.key;
                clampHour(digits);
                this.value = digits[0] + digits[1] + ':' + digits[2] + digits[3];
                const next = CARET_AFTER[idx];
                this.setSelectionRange(next, next);
                updateDuration();
                return;
            }

            if (e.key === 'Backspace') {
                e.preventDefault();
                const pos = Math.max(0, this.selectionStart - 1);
                const digits = timeDigits(this.value);
                const idx = digitIndexForCaret(pos);
                digits[idx] = '0';
                this.value = digits[0] + digits[1] + ':' + digits[2] + digits[3];
                this.setSelectionRange(CARET_BEFORE[idx], CARET_BEFORE[idx]);
                updateDuration();
                return;
            }

            if (e.key === 'Delete') {
                e.preventDefault();
                const digits = timeDigits(this.value);
                const idx = digitIndexForCaret(this.selectionStart);
                digits[idx] = '0';
                this.value = digits[0] + digits[1] + ':' + digits[2] + digits[3];
                this.setSelectionRange(CARET_BEFORE[idx], CARET_BEFORE[idx]);
                updateDuration();
            }
        });

        // Fallback for anything that bypasses keydown — paste, browser autofill, etc.
        input.addEventListener('input', function () {
            if (/^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(this.value)) return; // already well-formed
            let val = this.value.replace(/[^0-9]/g, '');
            if (val.length >= 3) {
                val = val.slice(0, 2) + ':' + val.slice(2, 4);
            }
            this.value = val;
            updateDuration();
        });

        input.addEventListener('blur', function () {
            let val = this.value.trim();
            if (!val) return;

            // Already valid HH:mm — nothing to do
            if (/^([01]?[0-9]|2[0-3]):[0-5][0-9]$/.test(val)) {
                // Ensure zero-padded hour: "9:00" -> "09:00"
                const [h, m] = val.split(':');
                this.value = h.padStart(2, '0') + ':' + m;
                updateDuration();
                return;
            }

            // Plain digits only — interpret as hours (and optionally minutes)
            const digits = val.replace(/[^0-9]/g, '');
            if (digits.length === 1 || digits.length === 2) {
                // "9" or "10" -> "09:00" or "10:00"
                const h = parseInt(digits, 10);
                if (h <= 23) {
                    this.value = String(h).padStart(2, '0') + ':00';
                }
            } else if (digits.length === 3) {
                // "930" -> "09:30"
                const h = parseInt(digits.slice(0, 1), 10);
                const m = parseInt(digits.slice(1), 10);
                if (h <= 23 && m <= 59) {
                    this.value = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
                }
            } else if (digits.length === 4) {
                // "1030" -> "10:30"
                const h = parseInt(digits.slice(0, 2), 10);
                const m = parseInt(digits.slice(2), 10);
                if (h <= 23 && m <= 59) {
                    this.value = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
                }
            }

            updateDuration();
        });
    });

    function parseTime(val) {
        const parts = val.split(':');
        if (parts.length !== 2) return null;
        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        if (isNaN(h) || isNaN(m) || h > 23 || m > 59) return null;
        return h * 60 + m;
    }

    function updateDuration() {
        const s = parseTime(startInput.value);
        const f = parseTime(finishInput.value);
        if (s === null || f === null || f <= s) {
            preview.style.display = 'none';
            return;
        }
        const mins = f - s;
        const h = Math.floor(mins / 60), m = mins % 60;
        durationText.textContent = (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm' : '');
        preview.style.display = 'block';
    }

    startInput.addEventListener('change', updateDuration);
    finishInput.addEventListener('change', updateDuration);
    updateDuration();

    // ─── Prevent double-submit (e.g. accidental double-click) ─────────────
    const workForm = document.getElementById('work-form');
    const saveBtn = document.getElementById('save-btn');
    let submitted = false;
    workForm.addEventListener('submit', function (e) {
        if (submitted) {
            e.preventDefault();
            return;
        }
        if (!workForm.checkValidity()) {
            return;
        }
        submitted = true;
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving...';
    });

    // Default any blank time field to 00:00 right before submitting.
    document.getElementById('work-form').addEventListener('submit', function () {
        document.querySelectorAll('.time-input').forEach(function (input) {
            if (!input.value.trim()) input.value = '00:00';
        });
    });
</script>
</body>
</html>
