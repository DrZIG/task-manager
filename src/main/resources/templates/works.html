<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Works — Task Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}">
    <link rel="apple-touch-icon" th:href="@{/apple-touch-icon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-kanban me-1"></i> Task Manager
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">User</span>
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header row -->
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm me-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Tasks
            </a>
            <h4 class="d-inline fw-bold mb-0">
                <i class="bi bi-clock-history me-1 text-primary"></i> All Works
            </h4>
        </div>
        <a th:href="@{/works/new}" class="btn btn-success btn-sm">
            <i class="bi bi-plus-lg"></i> Log Work
        </a>
    </div>

    <!-- Date Range Filter -->
    <div class="card mb-3 border-0 bg-light">
        <div class="card-body py-2">
            <form th:action="@{/works}" method="get" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label fw-semibold mb-1 small">From</label>
                    <input type="date" name="from" class="form-control form-control-sm"
                           th:value="${from}">
                </div>
                <div class="col-auto">
                    <label class="form-label fw-semibold mb-1 small">To</label>
                    <input type="date" name="to" class="form-control form-control-sm"
                           th:value="${to}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i> Filter
                    </button>
                    <a th:href="@{/works}" class="btn btn-outline-secondary btn-sm ms-1">
                        <i class="bi bi-x-circle me-1"></i> Clear
                    </a>
                </div>
                <div th:if="${from != null}" class="col-auto text-muted small">
                    Showing results from <strong th:text="${from}"></strong> to <strong th:text="${to}"></strong>
                </div>
            </form>
        </div>
    </div>

    <!-- Works Table -->
    <div th:if="${#lists.isEmpty(works)}" class="text-center text-muted py-5">
        <i class="bi bi-hourglass fs-1 d-block mb-2"></i>
        <p class="lead">No works found for the selected period.</p>
    </div>

    <div th:if="${not #lists.isEmpty(works)}" class="table-responsive">
        <table class="table table-hover align-middle table-bordered">
            <thead class="table-primary">
                <tr>
                    <th>Date</th>
                    <th>Task</th>
                    <th th:if="${isAdmin}">User</th>
                    <th>Start</th>
                    <th>Finish</th>
                    <th>Duration</th>
                    <th>
                        Daily Total
                        <i class="bi bi-info-circle text-muted small"
                           title="Total time logged across ALL works on the same date"
                           data-bs-toggle="tooltip"></i>
                    </th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Group visually by date using row styling -->
                <tr th:each="ws, stat : ${works}"
                    th:classappend="${stat.index > 0 and ws.work.workDate != works[stat.index - 1].work.workDate} ? 'border-top-2' : ''"
                    style="cursor:pointer;"
                    title="Double-click to edit"
                    th:ondblclick="|window.location.href='@{/works/__${ws.work.id}__/edit(from=works)}'|">

                    <td class="text-nowrap small fw-semibold">
                        <span th:text="${#temporals.format(ws.work.workDate, 'EEE, MMM d yyyy')}">Mon, Jan 1 2024</span>
                    </td>
                    <td>
                        <a th:href="@{/(taskId=${ws.work.task.id})}"
                           class="text-decoration-none fw-semibold small"
                           onclick="event.stopPropagation()"
                           th:text="${ws.work.task.title}">Task title</a>
                    </td>
                    <td th:if="${isAdmin}" class="small">
                        <i class="bi bi-person-circle me-1 text-muted"></i>
                        <span th:text="${ws.work.user.username}"></span>
                    </td>
                    <td class="text-nowrap small">
                        <i class="bi bi-play-fill text-success"></i>
                        <span th:text="${#temporals.format(ws.work.startTime, 'HH:mm')}">08:00</span>
                    </td>
                    <td class="text-nowrap small">
                        <i class="bi bi-stop-fill text-danger"></i>
                        <span th:text="${#temporals.format(ws.work.finishTime, 'HH:mm')}">11:15</span>
                    </td>
                    <td class="text-nowrap">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle"
                              th:text="${ws.work.formattedDuration}">2h 30m</span>
                    </td>
                    <td class="text-nowrap">
                        <span class="badge bg-success-subtle text-success border border-success-subtle"
                              th:text="${ws.formattedDailyTotal}">5h</span>
                    </td>
                    <td class="small" style="max-width: 250px;">
                        <span th:text="${ws.work.description ?: '—'}">Description text</span>
                    </td>
                    <td class="text-nowrap" onclick="event.stopPropagation()">
                        <a th:href="@{/works/{id}/edit(id=${ws.work.id}, from='works')}"
                           class="btn btn-outline-secondary btn-sm py-0 px-1 me-1" title="Edit">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                              th:action="@{/works/{id}/delete(id=${ws.work.id})}" method="post"
                              style="display:inline"
                              onsubmit="return confirm('Delete this work entry?')">
                            <input type="hidden" name="returnTo" value="works">
                            <button class="btn btn-outline-danger btn-sm py-0 px-1" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Summary footer -->
        <div class="text-muted small text-end mt-1">
            <i class="bi bi-bar-chart me-1"></i>
            Showing <strong th:text="${#lists.size(works)}">0</strong> work entries.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize Bootstrap tooltips
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
        new bootstrap.Tooltip(el);
    });
</script>
</body>
</html>
